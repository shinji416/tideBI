<style>
:root{
  --bg:#000; --panel:#071525; --panel2:#0b2238; --line:rgba(120,195,255,.28);
  --text:#f6fbff; --muted:#9fb3c7; --cyan:#36e6ff; --blue:#1597ff;
  --yellow:#ffd84a; --orange:#ff9838; --red:#ff3947; --green:#60ffa8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:#000;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;overscroll-behavior:none}
body{display:grid;place-items:center;overflow:hidden}
button,input,select{font:inherit;color:inherit} button{border:0;cursor:pointer} button:disabled{opacity:.45;cursor:not-allowed}
.appShell{width:min(100vw,480px);height:100dvh;max-height:980px;min-height:620px;overflow:hidden;background:#000;padding:calc(env(safe-area-inset-top) + 5px) 7px calc(env(safe-area-inset-bottom) + 5px);display:grid;gap:5px;grid-template-rows:40px 42px 47px minmax(210px,1fr) 120px 92px 96px}
.topbar,.pointbar,.statusStrip,.chartCard,.hourlyCard,.nowCard,.pointsPanel{background:linear-gradient(180deg,rgba(8,27,45,.96),rgba(3,12,22,.98));border:1px solid var(--line);box-shadow:0 8px 30px rgba(0,0,0,.35)}
.topbar{display:grid;grid-template-columns:1fr 34px 104px 34px 49px 34px;gap:4px;align-items:center;border-radius:15px;padding:4px}.brand{display:flex;align-items:center;gap:6px;min-width:0;font-weight:900;letter-spacing:-.03em;white-space:nowrap;overflow:hidden}.brandIcon{width:32px;height:32px;border-radius:9px;object-fit:cover}.brand span{font-size:14px;overflow:hidden;text-overflow:ellipsis}.roundBtn,.dateBtn,.smallBtn{height:32px;border-radius:10px;border:1px solid rgba(141,205,255,.35);background:linear-gradient(180deg,#174f88,#082a4d);font-weight:900}.roundBtn{font-size:24px;line-height:1}.dateBtn{font-size:14px}.smallBtn{font-size:13px;padding:0 8px;background:rgba(255,255,255,.08)}.primary{background:linear-gradient(180deg,#24a5ff,#0755b4)!important;color:#fff}
.pointbar{border-radius:15px;display:grid;grid-template-columns:38px 1fr 70px 58px;gap:6px;align-items:center;padding:5px 7px}.favBtn{height:32px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid var(--line);font-size:23px;color:var(--yellow)}.pointTitle{min-width:0;line-height:1.05}.pointTitle span{display:block;color:var(--muted);font-size:11px}.pointTitle strong{font-size:23px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tideBadge{height:33px;border-radius:10px;display:grid;place-items:center;font-size:18px;font-weight:900;background:linear-gradient(180deg,#22b3ff,#0958b9);border:1px solid rgba(89,229,255,.65)}.miniScore{height:33px;border-radius:8px;border:1px solid var(--line);background:#050b12;display:grid;place-items:center;line-height:.9}.miniScore span{font-size:10px;color:var(--muted)}.miniScore b{font-size:21px;color:var(--yellow)}
.statusStrip{display:grid;grid-template-columns:1.05fr .95fr .85fr repeat(4,1fr);border-radius:14px;overflow:hidden}.statusStrip div{display:grid;place-items:center;line-height:1.04;border-right:1px solid rgba(255,255,255,.13);padding:2px 0}.statusStrip div:last-child{border-right:0}.statusStrip b{font-size:14px}.statusStrip div:first-child b{font-size:19px}.statusStrip span{font-size:10px;color:var(--muted)}
.chartCard{position:relative;border-radius:15px;overflow:hidden;background:#000;min-height:0}.chartCard:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 48% 44%,rgba(33,178,255,.15),transparent 34%),linear-gradient(180deg,#001320,#000 90%);opacity:.95}.chartCard:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.06) 0 1px,transparent 1px 30px),repeating-linear-gradient(0deg,rgba(255,255,255,.04) 0 1px,transparent 1px 38px);opacity:.75}#tideSvg{position:relative;z-index:1;width:100%;height:100%;display:block}.axisText{font-size:10px;fill:#eaf8ff;font-weight:800}.smallText{font-size:9px;fill:#cde9ff}.labelText{font-size:12px;fill:#06111f;font-weight:900}.calloutTime{font-size:12px;fill:#fff;font-weight:900}.calloutCm{font-size:12px;fill:#06111f;font-weight:900}.currentText{font-size:10px;fill:#fff;font-weight:900}.fish{fill:rgba(178,226,255,.13)}
.hourlyCard{border-radius:14px;overflow:hidden;background:#010407}.hourlyGrid{height:100%;display:grid;grid-template-columns:42px repeat(9,1fr);grid-template-rows:22px 24px 24px 24px 24px 24px}.hourlyGrid>div{display:grid;place-items:center;border-right:1px solid rgba(255,255,255,.12);border-bottom:1px solid rgba(255,255,255,.12);font-size:12px;line-height:1.0;min-width:0}.hourlyGrid>div:nth-child(10n){border-right:0}.rowHead{background:rgba(255,255,255,.08);color:#eaf8ff;font-weight:900}.hourCell{font-weight:900;color:#fff;background:rgba(44,106,149,.5)}.weatherCell{font-size:17px!important}.arrow{font-size:18px;color:#fff;text-shadow:0 0 8px rgba(255,255,255,.4);display:inline-block}.numCell{font-weight:800;color:#fff}.waveCell{color:#a9eaff;font-weight:800}.tempCell{color:#ffd88d;font-weight:800}
.nowCard{border-radius:14px;display:grid;grid-template-columns:1.35fr repeat(4,1fr) 1.7fr;gap:4px;padding:5px;background:#02070d}.weatherNow,.metric,.bestBox{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.055);border-radius:12px;display:grid;place-items:center;text-align:center;min-width:0}.weatherNow{grid-template-columns:38px 1fr;grid-template-rows:1fr 1fr;padding:3px 5px}.weatherNow div{grid-row:1/3;font-size:31px}.weatherNow span{font-size:11px;color:#dcecff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}.weatherNow b{font-size:22px;letter-spacing:-.05em}.metric span,.bestBox span{font-size:10px;color:var(--muted)}.metric b{font-size:15px;white-space:nowrap}.bestBox{grid-template-columns:70px 1fr 1fr;padding:4px;gap:3px}.bestBox b{height:24px;border-radius:7px;background:linear-gradient(90deg,#ffd94d,#ffac30);display:grid;place-items:center;color:#06111f;font-size:13px}.bestBox b:last-child{background:linear-gradient(90deg,#ff9e40,#ff5a43)}
.pointsPanel{border-radius:14px;padding:5px;overflow:hidden;background:#010306}.pointGrid{height:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:4px}.pointBtn{position:relative;display:grid;place-items:center;text-align:center;line-height:1.05;border-radius:12px;background:linear-gradient(180deg,#142b42,#081521);border:1px solid rgba(170,220,255,.25);font-size:14px;font-weight:900;padding:2px 22px 2px 5px;overflow:hidden}.pointBtn.active{background:linear-gradient(180deg,#20aaff,#0754b3);border-color:#4be6ff;box-shadow:0 0 0 1px rgba(54,230,255,.5) inset}.pointBtn .pin{position:absolute;right:5px;top:5px;color:var(--yellow);font-size:12px}.pointBtn small{font-size:10px;color:var(--muted);display:block}.pointBtn.active small{color:#e9f7ff}
.mapDialog,.settingsDialog{border:0;padding:0;margin:auto;background:transparent;color:var(--text);width:min(100vw,480px);height:100dvh;max-height:980px}.mapDialog::backdrop,.settingsDialog::backdrop{background:rgba(0,0,0,.78);backdrop-filter:blur(5px)}.mapPanel{height:100%;padding:calc(env(safe-area-inset-top) + 7px) 7px calc(env(safe-area-inset-bottom) + 7px);background:#000;display:grid;gap:6px;grid-template-rows:40px 38px 34px minmax(270px,1fr) 74px 170px}.mapHead{display:grid;grid-template-columns:70px 1fr 74px;gap:6px;align-items:center}.mapHead strong{text-align:center;font-size:18px}.prefChips,.typeChips{display:grid;gap:5px}.prefChips{grid-template-columns:repeat(6,1fr)}.typeChips{grid-template-columns:repeat(6,1fr)}.chip{height:100%;border-radius:10px;border:1px solid var(--line);background:#081725;font-size:12px;font-weight:900}.chip.active{background:linear-gradient(180deg,#23aaff,#0754b3);border-color:#50e9ff}.mapBox{border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#081522}.leaflet-container{font-family:inherit}.leaflet-popup-content-wrapper{background:#06111f;color:#fff;border:1px solid rgba(80,190,255,.45);border-radius:12px}.leaflet-popup-tip{background:#06111f}.popupTitle{font-weight:900;font-size:15px}.popupMeta{color:#bfd1e3;font-size:12px;margin:.25em 0 .5em}.popupBtns{display:grid;grid-template-columns:1fr 1fr;gap:5px}.popupBtns button{height:34px;border-radius:8px;font-weight:900}.popupReg{background:#ffd84a;color:#08111e}.popupMap{background:#123659;color:#fff}.mapInfo{display:grid;grid-template-columns:1fr 74px 70px;gap:6px;align-items:center;border:1px solid var(--line);background:linear-gradient(180deg,#0a2034,#02070d);border-radius:15px;padding:7px}.mapInfo b{display:block;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mapInfo span{display:block;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.yellowBtn{height:44px;border-radius:11px;background:linear-gradient(180deg,#ffe357,#ffba20);color:#07111d;font-size:16px;font-weight:900}.spotList{overflow:auto;border:1px solid var(--line);border-radius:15px;background:#02070d;padding:5px;display:grid;gap:5px;align-content:start}.spotItem{height:45px;border-radius:11px;border:1px solid rgba(255,255,255,.12);background:#081725;display:grid;grid-template-columns:1fr auto;align-items:center;gap:5px;padding:5px 8px;text-align:left}.spotItem b{font-size:14px}.spotItem span{display:block;font-size:11px;color:var(--muted)}.spotItem.active{border-color:#54eaff;background:#082f55}.distance{font-size:12px;color:var(--yellow);font-weight:900}
.settingsPanel{height:auto;max-height:86dvh;margin:7dvh 8px 0;padding:14px;border-radius:18px;background:#071525;border:1px solid var(--line);display:grid;gap:10px}.dialogHead{display:grid;grid-template-columns:1fr 42px;align-items:center}.dialogHead strong{font-size:20px}.dialogHead button{height:36px;border-radius:10px;background:rgba(255,255,255,.1);font-size:22px}.hint{margin:0;color:#c4d8eb;font-size:13px;line-height:1.45}.manageList{display:grid;gap:6px;max-height:48dvh;overflow:auto}.manageRow{display:grid;grid-template-columns:1fr 54px;gap:6px;align-items:center}.manageName{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.06);border-radius:11px;padding:9px 10px;font-weight:900}.deleteBtn{height:42px;border-radius:11px;background:#c83043;font-weight:900}.wideBtn{height:48px;border-radius:13px;background:#132b43;border:1px solid var(--line);font-weight:900}
@media (max-height:760px){.appShell{grid-template-rows:38px 40px 42px minmax(170px,1fr) 112px 84px 88px;gap:4px}.pointTitle strong{font-size:20px}.statusStrip b{font-size:12px}.chartCard{border-radius:13px}.hourlyGrid{grid-template-rows:20px 22px 22px 22px 22px 22px}.nowCard{grid-template-columns:1.25fr repeat(4,1fr) 1.55fr}.weatherNow b{font-size:19px}.bestBox b{font-size:12px}.pointBtn{font-size:12px}.mapPanel{grid-template-rows:38px 34px 31px minmax(220px,1fr) 66px 132px}}

</style>

  const mh={time:[],wave_height:[],wave_direction:[],sea_surface_temperature:[]};
  for(let h=0;h<24;h++){
    wh.time.push(`${date}T${String(h).padStart(2,'0')}:00`);
    wh.temperature_2m.push(+(23+4*Math.sin((h-7)/24*2*Math.PI)+(p.prefecture==='静岡県'?1:0)).toFixed(1));
    wh.relative_humidity_2m.push(Math.round(70-8*Math.sin((h-8)/24*2*Math.PI)));
    wh.precipitation.push(0); wh.weather_code.push(h>18||h<5?1:2);
    wh.wind_speed_10m.push(+(3.5+2.1*Math.sin((h-10)/24*2*Math.PI)).toFixed(1));
    wh.wind_direction_10m.push(150+50*Math.sin(h/24*2*Math.PI)); wh.wind_gusts_10m.push(+(5+2*Math.sin((h-10)/24*2*Math.PI)).toFixed(1)); wh.surface_pressure.push(1015);
    mh.time.push(wh.time[h]); mh.wave_height.push(+(p.prefecture==='愛知県'?0.25:p.prefecture==='三重県'?0.35:p.prefecture==='静岡県'?0.45:0.5).toFixed(1)); mh.wave_direction.push(150); mh.sea_surface_temperature.push(+(23+1.2*Math.sin((h-8)/24*2*Math.PI)).toFixed(1));
  }
  return {weather:{hourly:wh},marine:{hourly:mh}};
}
async function fetchData(p){
  const date=ymd(selectedDate());
  const wParams=new URLSearchParams({latitude:p.lat,longitude:p.lon,timezone:'Asia/Tokyo',start_date:date,end_date:date,hourly:'temperature_2m,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,surface_pressure'});
  const mParams=new URLSearchParams({latitude:p.lat,longitude:p.lon,timezone:'Asia/Tokyo',start_date:date,end_date:date,hourly:'wave_height,wave_direction,sea_surface_temperature'});
  try{
    const [w,m]=await Promise.all([fetch(`https://api.open-meteo.com/v1/forecast?${wParams}`,{cache:'no-store'}),fetch(`https://marine-api.open-meteo.com/v1/marine?${mParams}`,{cache:'no-store'})]);
    if(!w.ok||!m.ok) throw new Error('api');
    state.weather=await w.json(); state.marine=await m.json();
  }catch(e){ const fb=fallbackWeather(p); state.weather=fb.weather; state.marine=fb.marine; }
}
function hourlyValues(hour){
  const wh=state.weather?.hourly||{}, mh=state.marine?.hourly||{};
  return {temp:nearestHourly(wh,'temperature_2m',hour),hum:nearestHourly(wh,'relative_humidity_2m',hour),rain:nearestHourly(wh,'precipitation',hour),code:nearestHourly(wh,'weather_code',hour),wind:nearestHourly(wh,'wind_speed_10m',hour),dir:nearestHourly(wh,'wind_direction_10m',hour),gust:nearestHourly(wh,'wind_gusts_10m',hour),pressure:nearestHourly(wh,'surface_pressure',hour),wave:nearestHourly(mh,'wave_height',hour),water:nearestHourly(mh,'sea_surface_temperature',hour),waveDir:nearestHourly(mh,'wave_direction',hour)};
}
function scoreAt(hour,tide){
  const v=hourlyValues(hour), p=selectedPoint();
  const move=Math.abs(tideHeight(p,Math.min(24,hour+1),tide.age)-tideHeight(p,hour,tide.age));
  const sun=sunTimes(selectedDate(),p.lon);
  let s=38; s+=clamp(move/18,0,1)*24; s+=Math.max(0,1-Math.min(Math.abs(hour-sun.sunrise),Math.abs(hour-sun.sunset))/2.2)*18;
  s+=(v.wind??3)<=5?13:(v.wind<=8?4:-10); s+=(v.wave??.3)<=.6?13:(v.wave<=1?5:-8); s+=(v.rain??0)<=.2?5:-8; s+=['大潮','中潮'].includes(tideClass(tide.age))?7:0;
  return Math.round(clamp(s,0,100));
}
function bestWindows(tide){
  const arr=[]; for(let h=0;h<24;h+=.5) arr.push({h,s:scoreAt(h,tide)});
  const picks=[]; for(const row of [...arr].sort((a,b)=>b.s-a.s)){ if(picks.every(p=>Math.abs(p.h-row.h)>4)) picks.push(row); if(picks.length===2) break; }
  return picks.map(p=>({start:clamp(p.h-1.25,0,23.5),end:clamp(p.h+1.25,.5,24),score:p.s})).sort((a,b)=>a.start-b.start);
}
function renderHourly(){
  const hours=[0,3,6,9,12,15,18,21,23]; const grid=$('hourlyGrid'); grid.innerHTML='';
  const heads=['時間','天気','風向','風速','波高','水温'];
  heads.forEach((h,r)=>{ const d=document.createElement('div'); d.textContent=h; d.className='rowHead'; grid.append(d); hours.forEach(hour=>{ const v=hourlyValues(hour); const c=document.createElement('div'); if(r===0){c.textContent=hour===23?'23':String(hour); c.className='hourCell'} if(r===1){c.textContent=weatherIcon(v.code,hour); c.className='weatherCell'} if(r===2){c.innerHTML=`<span class="arrow" style="transform:rotate(${v.dir||0}deg)">➤</span><small>${shortDir(v.dir)}</small>`; c.className='numCell'} if(r===3){c.textContent=`${(v.wind??0).toFixed(1)}`; c.className='numCell'} if(r===4){c.textContent=`${(v.wave??0).toFixed(1)}m`; c.className='waveCell'} if(r===5){c.textContent=`${(v.water??0).toFixed(1)}°`; c.className='tempCell'} grid.append(c); }); });
}
function renderPoints(){
  const grid=$('pointGrid'); grid.innerHTML='';
  state.points.slice(0,9).forEach(p=>{ const b=document.createElement('button'); b.className='pointBtn'+(p.name===state.selectedName?' active':''); b.innerHTML=`<span>${p.name}</span><small>${p.prefecture.replace('県','')}</small><i class="pin">${state.favorites.has(p.name)?'★':'☆'}</i>`; b.onclick=()=>{state.selectedName=p.name;localStorage.setItem('ftbi.selected',p.name); renderAll();}; grid.append(b); });
}
function renderManageList(){
  const list=$('manageList'); if(!list) return; list.innerHTML='';
  state.points.slice(0,9).forEach(p=>{ const row=document.createElement('div'); row.className='manageRow'; row.innerHTML=`<div class="manageName">${p.name}<small>　${p.prefecture} ${p.type||''}</small></div><button class="deleteBtn">削</button>`; row.querySelector('button').onclick=()=>{ state.points=state.points.filter(x=>x.name!==p.name); if(state.selectedName===p.name) state.selectedName=state.points[0]?.name||'名古屋港'; savePoints(); renderAll(); renderManageList(); }; list.append(row); });
}
async function renderAll(){
  const p=selectedPoint(); $('dateButton').textContent=fmtDate(selectedDate()); $('prefName').textContent=p.prefecture; $('pointName').textContent=p.name;
  $('favButton').textContent=state.favorites.has(p.name)?'★':'☆';
  const tide=tideSeries(p,selectedDate()); const ch=tideClass(tide.age); $('tideType').textContent=ch; $('moonAge').textContent=tide.age.toFixed(1);
  const sun=sunTimes(selectedDate(),p.lon), moon=moonTimes(tide.age); $('sunrise').textContent=hm(sun.sunrise); $('sunset').textContent=hm(sun.sunset); $('moonrise').textContent=hm(moon.rise); $('moonset').textContent=hm(moon.set);
  const cur=tideHeight(p,currentHour(),tide.age), prev=tideHeight(p,Math.max(0,currentHour()-1),tide.age); $('currentTide').textContent=`${Math.round(cur)}cm`; $('tideDiff').textContent=`${cur-prev>=0?'↑':'↓'}${Math.abs(cur-prev).toFixed(1)}`;
  drawTide(tide); renderPoints();
  await fetchData(p);
  const now=hourlyValues(currentHour()); $('weatherIcon').textContent=weatherIcon(now.code,currentHour()); $('weatherText').textContent=weatherText(now.code); $('temperature').textContent=`${(now.temp??0).toFixed(1)}℃`; $('windDir').textContent=compass(now.dir); $('windSpeed').textContent=`${(now.wind??0).toFixed(1)}m/s`; $('waveHeight').textContent=`${(now.wave??0).toFixed(1)}m`; $('waterTemp').textContent=`${(now.water??0).toFixed(1)}℃`;
  const wins=bestWindows(tide); $('bestTime1').textContent=wins[0]?`${hm(wins[0].start)}〜${hm(wins[0].end)}`:'--'; $('bestTime2').textContent=wins[1]?`${hm(wins[1].start)}〜${hm(wins[1].end)}`:'--'; const score=scoreAt(currentHour(),tide); $('scoreBadge').textContent=score;
  renderHourly(); renderManageList();
}

function filteredSpots(){
  let arr=SPOTS.filter(s=>s.prefecture===state.mapPref && (state.mapType==='すべて'||s.type===state.mapType));
  if(state.userLocation){ arr=arr.map(s=>({...s,distance:degDistanceKm(state.userLocation.lat,state.userLocation.lon,s.lat,s.lon)})).sort((a,b)=>a.distance-b.distance); }
  return arr;
}
function initMap(){
  if(state.map || !window.L) return;
  state.map=L.map('map',{zoomControl:true,attributionControl:false}).setView([34.85,136.9],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(state.map);
  state.map.on('click',e=>{
    const custom={name:'地図で選択', prefecture:state.mapPref, area:'任意地点', type:'任意', lat:+e.latlng.lat.toFixed(6), lon:+e.latlng.lng.toFixed(6), amp:50, base:100, phase:0};
    chooseMapSpot(custom);
  });
}
function renderMapControls(){
  const pc=$('prefChips'); pc.innerHTML=''; PREFS.forEach(pref=>{ const b=document.createElement('button'); b.className='chip'+(pref===state.mapPref?' active':''); b.textContent=pref.replace('県',''); b.onclick=()=>{state.mapPref=pref; state.userLocation=null; renderMap();}; pc.append(b); });
  const tc=$('typeChips'); tc.innerHTML=''; TYPES.forEach(type=>{ const b=document.createElement('button'); b.className='chip'+(type===state.mapType?' active':''); b.textContent=type; b.onclick=()=>{state.mapType=type; renderMap();}; tc.append(b); });
}
function chooseMapSpot(s){
  state.chosenSpot={...s}; $('mapSpotName').textContent=s.name; $('mapSpotMeta').textContent=`${s.prefecture} ${s.area} ${s.type}${s.distance?`・約${s.distance.toFixed(1)}km`:''}`; $('registerMapSpot').disabled=false; $('openGoogleMap').disabled=false;
}
function renderMap(){
  renderMapControls(); initMap(); if(!state.map) return;
  setTimeout(()=>state.map.invalidateSize(),50);
  state.markers.forEach(m=>m.remove()); state.markers=[];
  const arr=filteredSpots(); const bounds=[];
  arr.forEach(s=>{
    const marker=L.marker([s.lat,s.lon]).addTo(state.map); marker.bindPopup(`<div class="popupTitle">${s.name}</div><div class="popupMeta">${s.prefecture} ${s.area}｜${s.type}</div><div class="popupBtns"><button class="popupReg" data-reg="${s.name}">登録</button><button class="popupMap" data-map="${s.name}">Google</button></div>`); marker.on('click',()=>chooseMapSpot(s)); state.markers.push(marker); bounds.push([s.lat,s.lon]);
  });
  if(bounds.length) state.map.fitBounds(bounds,{padding:[24,24],maxZoom:10});
  const list=$('spotList'); list.innerHTML='';
  arr.forEach(s=>{ const item=document.createElement('button'); item.className='spotItem'+(state.chosenSpot?.name===s.name?' active':''); item.innerHTML=`<div><b>${s.name}</b><span>${s.prefecture} ${s.area}｜${s.type}</span></div><span class="distance">${s.distance?`${s.distance.toFixed(1)}km`:''}</span>`; item.onclick=()=>{chooseMapSpot(s); if(state.map) state.map.setView([s.lat,s.lon],13);}; list.append(item); });
}
function registerSpot(s){
  const spot={...s}; if(!spot.amp){ spot.amp=50; spot.base=100; spot.phase=0; }
  const exists=state.points.findIndex(p=>p.name===spot.name);
  if(exists>=0){ state.points[exists]=spot; }
  else if(state.points.length<9){ state.points.push(spot); }
  else { const idx=Math.max(0,state.points.findIndex(p=>p.name===state.selectedName)); state.points[idx]=spot; }
  state.selectedName=spot.name; localStorage.setItem('ftbi.selected',spot.name); savePoints(); renderAll();
}
function googleMapUrl(s){ return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${s.name} ${s.prefecture} ${s.area}`)}`; }
function openMapDialog(){ $('mapDialog').showModal(); setTimeout(()=>{renderMap();},80); }
function openSettings(){ renderManageList(); $('settingsDialog').showModal(); }

function setupEvents(){
  $('prevDay').onclick=()=>{state.dateOffset=Math.max(-1,state.dateOffset-1); renderAll();};
  $('nextDay').onclick=()=>{state.dateOffset=Math.min(14,state.dateOffset+1); renderAll();};
  $('dateButton').onclick=()=>{ const steps=[0,1,3,7,14]; const i=steps.indexOf(state.dateOffset); state.dateOffset=steps[(i+1)%steps.length]; renderAll(); };
  $('favButton').onclick=()=>{ const p=selectedPoint(); state.favorites.has(p.name)?state.favorites.delete(p.name):state.favorites.add(p.name); saveFavs(); renderAll(); };
  $('mapOpen').onclick=openMapDialog; $('settingsOpen').onclick=openSettings; $('mapClose').onclick=()=>$('mapDialog').close();
  $('registerMapSpot').onclick=()=>{ if(state.chosenSpot){ registerSpot(state.chosenSpot); $('mapDialog').close(); }};
  $('openGoogleMap').onclick=()=>{ if(state.chosenSpot) window.open(googleMapUrl(state.chosenSpot),'_blank'); };
  $('nearButton').onclick=()=>{ if(!navigator.geolocation){ alert('位置情報が使えません'); return; } navigator.geolocation.getCurrentPosition(pos=>{ state.userLocation={lat:pos.coords.latitude,lon:pos.coords.longitude}; renderMap(); },()=>alert('位置情報を取得できませんでした'),{enableHighAccuracy:true,timeout:10000}); };
  $('mapDialog').addEventListener('click',e=>{ const r=e.target.closest('[data-reg]'), m=e.target.closest('[data-map]'); if(r){ const s=SPOTS.find(x=>x.name===r.dataset.reg); if(s){ registerSpot(s); $('mapDialog').close(); }} if(m){ const s=SPOTS.find(x=>x.name===m.dataset.map); if(s) window.open(googleMapUrl(s),'_blank'); }});
  $('resetPoints').onclick=()=>{ state.points=DEFAULT_POINTS.map(p=>({...p})); state.selectedName='名古屋港'; savePoints(); localStorage.setItem('ftbi.selected',state.selectedName); renderAll(); renderManageList(); };
}

setupEvents();
renderAll();

</script>
